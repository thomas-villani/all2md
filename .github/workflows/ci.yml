name: CI

on:
  push:
    branches:
      - main
      - 'release/**'
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - 'release/**'

permissions:
  contents: write  # Required for `gh release create` in the release job

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v7

      - name: Set up Python 3.12
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all,dev]"

      - name: Run Black formatter check
        run: |
          black --check src/ tests/

      - name: Run Ruff linter
        run: |
          ruff check src/ tests/

      - name: Run MyPy type checker
        run: |
          mypy src/

  docs:
    name: Build Documentation
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v7

      - name: Set up Python 3.12
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all,dev]"

      - name: Build Sphinx documentation
        run: |
          cd docs
          make html SPHINXOPTS="-W --keep-going"

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - name: Check out code
        uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all,dev]"

      - name: Run tests with coverage
        run: |
          pytest tests/ -v --cov=all2md --cov-report=xml --cov-report=term

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v7
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          verbose: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  security-semgrep:
    name: Security Scan (Semgrep)
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v7

      - name: Run Semgrep
        uses: semgrep/semgrep-action@v1
        with:
          config: auto
          # Rule exclusions are intentionally NOT configured here: `--exclude-rule`
          # is not honored by semgrep-action@v1's `config: auto` mode — the cloud
          # ruleset ignores locally-passed args (and the action has no
          # `semgrepArgs` input anyway). False positives are suppressed per-line
          # with `# nosemgrep: <rule-id>` instead — see
          # `benchmarks/corpus/download.py:55` for the non-literal-import
          # suppression in the manifest generator.
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

  security-bandit:
    name: Security Scan (Bandit)
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v7

      - name: Set up Python 3.12
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install Bandit
        run: |
          python -m pip install --upgrade pip
          pip install bandit[toml]

      - name: Run Bandit
        run: |
          bandit -c pyproject.toml -r src/

  release:
    name: Create GitHub Release
    # On tag push, after all CI checks pass: verify the version, build the
    # package as a sanity check, and create a GitHub Release for the notes.
    # The PyPI publish is handled by `release.yml` (the workflow registered
    # with PyPI's trusted publisher), which triggers via `workflow_run` when
    # this CI run completes successfully — so publishing is gated on CI.
    # (The Release created here uses GITHUB_TOKEN, whose `release: published`
    # event would not start release.yml anyway.)
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [lint-and-typecheck, docs, test, security-semgrep, security-bandit]
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build hatchling

      - name: Verify version matches tag
        run: |
          PROJECT_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")
          RELEASE_VERSION="${GITHUB_REF_NAME#v}"
          echo "Project version: $PROJECT_VERSION"
          echo "Release version: $RELEASE_VERSION"
          if [ "$PROJECT_VERSION" != "$RELEASE_VERSION" ]; then
            echo "Error: pyproject.toml version ($PROJECT_VERSION) does not match tag ($RELEASE_VERSION)"
            exit 1
          fi
          # The MCPB bundle version is bumpversion-managed; verify it kept in
          # sync so we never ship a stale-versioned .mcpb.
          MCPB_VERSION=$(python -c "import json; print(json.load(open('mcpb/manifest.json'))['version'])")
          echo "MCPB manifest version: $MCPB_VERSION"
          if [ "$MCPB_VERSION" != "$RELEASE_VERSION" ]; then
            echo "Error: mcpb/manifest.json version ($MCPB_VERSION) does not match tag ($RELEASE_VERSION)"
            echo "Run 'bumpversion' to sync it (see [tool.bumpversion] in pyproject.toml)."
            exit 1
          fi

      - name: Build package
        run: python -m build

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Build MCPB bundle
        # Package the built-in MCP server as a .mcpb for one-click install in
        # Claude Desktop. The bundle only declares `all2md` as a dependency
        # (resolved by uv on the user's machine at install time), so packing
        # before the PyPI publish in release.yml is fine. Pin the CLI version
        # for reproducible releases — bump deliberately after testing locally.
        run: |
          npm install -g @anthropic-ai/mcpb@2.1.2
          mcpb validate mcpb/manifest.json
          mcpb pack mcpb all2md.mcpb

      - name: Create GitHub Release
        run: gh release create "$GITHUB_REF_NAME" --generate-notes all2md.mcpb
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
