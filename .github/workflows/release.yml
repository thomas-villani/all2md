name: Release to PyPI (manual fallback)

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (e.g. v1.0.5)'
        required: true

permissions:
  contents: read
  id-token: write  # Required for PyPI trusted publishing

jobs:
  build-and-publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    environment: pypi

    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          # On `release: published` events, github.event.release.tag_name is
          # set; on `workflow_dispatch` (the manual fallback), only inputs.tag
          # is available. The `||` fallback expression handles both.
          ref: ${{ github.event.release.tag_name || inputs.tag }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build hatchling

      - name: Verify version matches release tag
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}
        run: |
          # Extract version from pyproject.toml
          PROJECT_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")
          # Extract version from release tag (remove 'v' prefix if present)
          RELEASE_VERSION="${RELEASE_TAG#v}"

          echo "Project version: $PROJECT_VERSION"
          echo "Release version: $RELEASE_VERSION"

          if [ "$PROJECT_VERSION" != "$RELEASE_VERSION" ]; then
            echo "Error: Version mismatch!"
            echo "pyproject.toml version ($PROJECT_VERSION) does not match release tag ($RELEASE_VERSION)"
            exit 1
          fi
          echo "Version check passed!"

      - name: Build package
        run: |
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          print-hash: true
