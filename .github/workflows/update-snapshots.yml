name: Update Golden Snapshots

on:
  workflow_dispatch:
    inputs:
      tests:
        description: "Pytest selector (default: tests/golden/ — narrow to a specific file or class for fewer changes)"
        required: false
        type: string
        default: "tests/golden/"

permissions:
  contents: write

concurrency:
  group: update-snapshots-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update:
    name: Regenerate snapshots
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all,dev]"

      - name: Run pytest with --snapshot-update
        env:
          TEST_SELECTOR: ${{ inputs.tests }}
        run: |
          pytest "$TEST_SELECTOR" --snapshot-update

      - name: Detect snapshot changes
        id: changes
        run: |
          git add 'tests/**/__snapshots__/*.ambr' || true
          if git diff --staged --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No snapshot changes detected." | tee -a "$GITHUB_STEP_SUMMARY"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            {
              echo "## Snapshot changes"
              echo ""
              echo '```'
              git diff --staged --stat
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        env:
          REF_NAME: ${{ github.ref_name }}
          TEST_SELECTOR: ${{ inputs.tests }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Update golden snapshots" -m "Triggered by workflow_dispatch on $REF_NAME with selector: $TEST_SELECTOR"
          git push origin "HEAD:$REF_NAME"
